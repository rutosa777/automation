<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tool</title>

<style>
body {
    background: #0f2027;
    color: white;
    font-family: Arial;
    text-align: center;
}

textarea {
    width: 80%;
    height: 120px;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    background: #1c2b36;
    padding: 15px;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>AI Automation Tool</h2>

<form method="POST">
    <textarea name="text" placeholder="Enter text..."></textarea><br>
    <button type="submit">Generate</button>
</form>

<div class="result">
{{ result }}
</div>

</body>
</html>
